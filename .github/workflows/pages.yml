name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build browser binary
        run: cargo build --release --target wasm32-unknown-unknown --bin gorillas

      - name: Assemble Pages artifact
        run: |
          artifact_dir="$(mktemp -d)"
          mkdir -p "$artifact_dir/vendor"
          cp web/index.html "$artifact_dir/index.html"
          cp web/vendor/mq_js_bundle.js "$artifact_dir/vendor/mq_js_bundle.js"
          cp target/wasm32-unknown-unknown/release/gorillas.wasm "$artifact_dir/gorillas.wasm"
          echo "PAGES_ARTIFACT_DIR=$artifact_dir" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PAGES_ARTIFACT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
