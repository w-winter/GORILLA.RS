name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    name: release gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test -q

  build:
    name: package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            executable: gorillas
            asset_suffix: linux-x86_64
            cross_linux: false
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            executable: gorillas
            asset_suffix: linux-aarch64
            cross_linux: true
          - label: macos-x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            executable: gorillas
            asset_suffix: macos-x86_64
            cross_linux: false
          - label: macos-aarch64
            os: macos-26
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            executable: gorillas
            asset_suffix: macos-aarch64
            cross_linux: false
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            executable: gorillas.exe
            asset_suffix: windows-x86_64
            cross_linux: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.cross_linux == false
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross_linux
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.cross_linux }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}" --bin gorillas
          else
            cargo build --release --target "${{ matrix.target }}" --bin gorillas
          fi

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          package_name="gorillas-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"
          package_dir="dist/${package_name}"
          mkdir -p "$package_dir/assets/fonts"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "$package_dir/"
          cp README.md NOTICE THIRDPARTY.md LICENSE LICENSE-MIT LICENSE-APACHE "$package_dir/"
          cp assets/fonts/CC-BY-SA-4.0.txt "$package_dir/assets/fonts/CC-BY-SA-4.0.txt"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (
              cd dist
              7z a "${package_name}.zip" "${package_name}"
            )
          else
            tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
          fi

      - name: Verify packaged archive contents
        shell: bash
        run: |
          set -euo pipefail
          package_name="gorillas-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"
          archive_path="dist/${package_name}.${{ matrix.archive_ext }}"
          unpack_dir="$(mktemp -d)"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z x -o"$unpack_dir" "$archive_path"
          else
            tar -C "$unpack_dir" -xzf "$archive_path"
          fi

          test -f "$unpack_dir/$package_name/NOTICE"
          test -f "$unpack_dir/$package_name/THIRDPARTY.md"
          test -f "$unpack_dir/$package_name/assets/fonts/CC-BY-SA-4.0.txt"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorillas-${{ github.ref_name }}-${{ matrix.asset_suffix }}
          path: dist/gorillas-${{ github.ref_name }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/SHA256SUMS.txt \
            --verify-tag \
            --notes-from-tag \
            --title "Release ${GITHUB_REF_NAME}"
